<svg viewBox="0 0 600 470" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <!-- dark background -->
  <rect x="0" y="0" width="600" height="470" fill="#1B1F24"/>

  <!-- Roofline / mountain mark -->
  <g>
    <rect x="374" y="68" width="15" height="38" fill="#D08A45"/>
    <path d="M 190 170 L 258 82 L 304 128 L 358 52 L 422 170"
          fill="none" stroke="#F2F1EE" stroke-width="15"
          stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="150" y1="170" x2="450" y2="170" stroke="#5C636C" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Monogram -->
  <text x="300" y="298" text-anchor="middle" font-size="112" font-weight="900"
        letter-spacing="8" fill="#F2F1EE">MHM</text>

  <!-- Divider with accent diamond -->
  <g>
    <line x1="170" y1="330" x2="288" y2="330" stroke="#3A4048" stroke-width="2"/>
    <rect x="294" y="324" width="12" height="12" fill="#D08A45" transform="rotate(45 300 330)"/>
    <line x1="312" y1="330" x2="430" y2="330" stroke="#3A4048" stroke-width="2"/>
  </g>

  <!-- Taglines -->
  <text x="300" y="368" text-anchor="middle" font-size="21" font-weight="700"
        letter-spacing="6" fill="#F2F1EE">CUSTOM HOME BUILDERS</text>
  <text x="300" y="398" text-anchor="middle" font-size="15" font-weight="500"
        letter-spacing="5" fill="#9AA0A8">GENERAL CONTRACTOR</text>

  <!-- Phone -->
  <text x="300" y="438" text-anchor="middle" font-size="19" font-weight="700"
        letter-spacing="3" fill="#D08A45">570-998-1909</text>
</svg>
